name: publish

# Publishes `addisai` to npm with provenance.
# Create a GitHub Release (tag e.g. v0.1.0) to trigger, or run manually.
# Requires the NPM_TOKEN repository secret (an npm automation/granular token).
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      # Guard: never ship a source map that embeds the original source.
      - run: |
          if grep -rlq "sourcesContent" dist 2>/dev/null; then
            echo "::error::A dist source map embeds sourcesContent — refusing to publish."
            exit 1
          fi
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
